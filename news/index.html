<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>cat4 // news_api</title>
        <style>
            :root { --bg: #000000; --fg: #ffffff; --accent: #444444; --font: "JetBrains Mono", monospace; }
            body { background: var(--bg); color: var(--fg); font-family: var(--font); margin: 0; padding: 20px; }
            header { border-bottom: 1px solid var(--fg); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; }
            .news-row { display: flex; flex-direction: column; gap: 10px; max-width: 900px; margin: 0 auto; }
            .article-strip { display: flex; gap: 15px; align-items: center; padding: 12px; border: 1px solid var(--accent); cursor: pointer; }
            .article-strip:hover { border-color: var(--fg); background: #111; }
            .article-strip img { width: 80px; height: 50px; object-fit: cover; filter: grayscale(1); }
            .article-strip:hover img { filter: grayscale(0); }
            
            #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; overflow-y: auto; padding: 40px 20px; }
            .reader-content { max-width: 800px; margin: 0 auto; border: 1px solid var(--fg); padding: 30px; background: var(--bg); position: relative; }
            .reader-header { border-bottom: 1px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; }
            .close-btn { cursor: pointer; color: #ff0000; font-weight: bold; }
            .article-body { line-height: 1.8; color: #ccc; font-size: 0.95rem; }
            .article-body img { max-width: 100%; height: auto; margin: 20px 0; border: 1px solid var(--accent); }
            .loader { color: #00ff00; font-size: 0.8rem; font-style: italic; }
        </style>
    </head>
    <body>
        <header>
            <span>CAT4_NEWS_API [LIVE_FEED]</span>
            <a href="/" style="color:var(--fg); text-decoration:none;">[ EXIT ]</a>
        </header>

        <div id="news-grid" class="news-row">CONNECTING_TO_API...</div>

        <div id="reader">
            <div class="reader-content">
                <div class="reader-header">
                    <span>ARTICLE_DECRYPTOR</span>
                    <span class="close-btn" onclick="closeReader()">[ CLOSE_ESC ]</span>
                </div>
                <div id="reader-body"></div>
            </div>
        </div>

        <script>
            const API_BASE = "https://aninews.vercel.app/api/news";

            async function loadNews() {
                const grid = document.getElementById('news-grid');
                try {
                    const res = await fetch(`${API_BASE}?limit=20`);
                    const json = await res.json();
                    grid.innerHTML = "";

                    if (!json.success) throw new Error();

                    json.data.forEach(item => {
                        const strip = document.createElement('div');
                        strip.className = 'article-strip';
                        strip.onclick = () => openFullArticle(item.slug, item.title, item.image, item.link);
                        strip.innerHTML = `
                            <img src="${item.image}" onerror="this.style.display='none'">
                            <div style="flex-grow:1; font-size:0.85rem;">> ${item.title}</div>
                            <div style="font-size:0.6rem; color:var(--accent); text-transform:uppercase;">${item.source}</div>
                        `;
                        grid.appendChild(strip);
                    });
                } catch (e) {
                    grid.innerHTML = "FATAL: API_RESPONSE_ERROR";
                }
            }

            async function openFullArticle(slug, title, mainImg, fallbackLink) {
                const reader = document.getElementById('reader');
                const body = document.getElementById('reader-body');
                reader.style.display = 'block';
                document.body.style.overflow = 'hidden';
                body.innerHTML = `<div class="loader">FETCHING_FULL_TEXT_FOR: ${slug}...</div>`;

                try {
                    const res = await fetch(`${API_BASE}/${slug}`);
                    const json = await res.json();
                    
                    if (json.success && json.data.content) {
                        body.innerHTML = `
                            <h2 style="margin-top:0;">${title}</h2>
                            <img src="${mainImg}" style="width:100%; border:1px solid #333; margin-bottom:20px;">
                            <div class="article-body">${json.data.content}</div>
                            <br>
                            <a href="${fallbackLink}" target="_blank" style="color:var(--accent); font-size:0.7rem;">[ SOURCE_URL ]</a>
                        `;
                    } else {
                        throw new Error("Empty content");
                    }
                } catch (e) {
                    body.innerHTML = `
                        <h2>${title}</h2>
                        <img src="${mainImg}" style="width:100%; margin-bottom:20px;">
                        <div class="article-body" style="color:red;">
                            ERROR: FULL_TEXT_DECRYPTION_FAILED
                            <p style="color:white;">The API could not extract the full text for this specific article.</p>
                        </div>
                        <a href="${fallbackLink}" target="_blank" style="display:inline-block; margin-top:20px; border:1px solid white; padding:10px; color:white; text-decoration:none;">READ_ON_OFFICIAL_SITE</a>
                    `;
                }
            }

            function closeReader() { 
                document.getElementById('reader').style.display = 'none'; 
                document.body.style.overflow = 'auto';
            }

            window.addEventListener('keydown', (e) => { 
                if (e.key === "Escape") closeReader(); 
            });

            loadNews();
        </script>
    </body>
</html>
