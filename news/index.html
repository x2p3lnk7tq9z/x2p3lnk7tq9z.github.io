<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>cat4 // news_api</title>
        <style>
            :root { --bg: #000000; --fg: #ffffff; --accent: #444444; --font: "JetBrains Mono", monospace; }
            body { background: var(--bg); color: var(--fg); font-family: var(--font); margin: 0; padding: 20px; }
            header { border-bottom: 1px solid var(--fg); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; }
            .news-row { display: flex; flex-direction: column; gap: 10px; max-width: 900px; margin: 0 auto; }
            .article-strip { display: flex; gap: 15px; align-items: center; padding: 12px; border: 1px solid var(--accent); cursor: pointer; }
            .article-strip:hover { border-color: var(--fg); background: #111; }
            .article-strip img { width: 80px; height: 50px; object-fit: cover; filter: grayscale(1); }
            .article-strip:hover img { filter: grayscale(0); }
            
            #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; overflow-y: auto; padding: 40px 20px; }
            .reader-content { max-width: 800px; margin: 0 auto; border: 1px solid var(--fg); padding: 30px; background: var(--bg); }
            .article-body { line-height: 1.8; color: #ccc; }
            .article-body img { max-width: 100%; height: auto; margin: 20px 0; }
            .loader { color: #00ff00; font-size: 0.8rem; }
        </style>
    </head>
    <body>
        <header>
            <span>CAT4_NEWS_API [LIVE_FEED]</span>
            <a href="/" style="color:var(--fg); text-decoration:none;">[ EXIT ]</a>
        </header>

        <div id="news-grid" class="news-row">FETCHING_REMOTE_ASSETS...</div>

        <div id="reader">
            <div class="reader-content">
                <div style="text-align:right; margin-bottom:10px;">
                    <span style="cursor:pointer; color:red;" onclick="closeReader()">[ CLOSE_ESC ]</span>
                </div>
                <div id="reader-body"></div>
            </div>
        </div>

        <script>
            const API_BASE = "https://aninews.vercel.app/api/news";

            async function loadNews() {
                const grid = document.getElementById('news-grid');
                try {
                    const res = await fetch(`${API_BASE}?limit=15`);
                    const json = await res.json();
                    grid.innerHTML = "";

                    json.data.forEach(item => {
                        const strip = document.createElement('div');
                        strip.className = 'article-strip';
                        strip.onclick = () => openFullArticle(item.slug, item.title, item.image);
                        strip.innerHTML = `
                            <img src="${item.image || ''}" onerror="this.style.display='none'">
                            <div style="flex-grow:1;">> ${item.title}</div>
                            <div style="font-size:0.6rem; color:var(--accent);">${item.source}</div>
                        `;
                        grid.appendChild(strip);
                    });
                } catch (e) {
                    grid.innerHTML = "API_UNREACHABLE: CHECK_ENDPOINT";
                }
            }

            async function openFullArticle(slug, title, mainImg) {
                const reader = document.getElementById('reader');
                const body = document.getElementById('reader-body');
                reader.style.display = 'block';
                body.innerHTML = `<div class="loader">DECRYPTING_FULL_CONTENT_FROM_SLUG...</div>`;

                try {
                    const res = await fetch(`${API_BASE}/${slug}`);
                    const json = await res.json();
                    
                    body.innerHTML = `
                        <h2>${title}</h2>
                        <img src="${mainImg}" style="width:100%; margin-bottom:20px;">
                        <div class="article-body">${json.data.content || json.data.excerpt}</div>
                        <br>
                        <a href="${json.data.link}" target="_blank" style="color:white; font-size:0.7rem;">[ VIEW_ORIGINAL_SOURCE ]</a>
                    `;
                } catch (e) {
                    body.innerHTML = "ERROR: FAILED_TO_FETCH_FULL_TEXT";
                }
            }

            function closeReader() { document.getElementById('reader').style.display = 'none'; }
            window.onkeydown = (e) => { if(e.key === "Escape") closeReader(); };
            loadNews();
        </script>
    </body>
</html>
