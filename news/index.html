<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>cat4 // news</title>
        <style>
            :root { --bg: #000000; --fg: #ffffff; --accent: #444444; --font: "JetBrains Mono", monospace; }
            body { background: var(--bg); color: var(--fg); font-family: var(--font); margin: 0; padding: 20px; }
            header { border-bottom: 1px solid var(--fg); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; }
            .news-row { display: flex; flex-direction: column; gap: 10px; max-width: 900px; margin: 0 auto; }
            .article-strip { display: flex; gap: 20px; align-items: center; padding: 15px; border: 1px solid var(--accent); cursor: pointer; }
            .article-strip:hover { border-color: var(--fg); background: #111; }
            .article-strip img { width: 120px; height: 80px; object-fit: cover; border: 1px solid var(--accent); }
            #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; overflow-y: auto; padding: 40px 20px; }
            .reader-content { max-width: 800px; margin: 0 auto; border: 1px solid var(--fg); padding: 30px; background: var(--bg); }
            .reader-header { border-bottom: 1px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; }
            .close-btn { cursor: pointer; color: #ff0000; }
            .article-body { line-height: 1.8; color: #ccc; font-size: 1rem; }
            .article-body img { max-width: 100%; height: auto; margin: 20px 0; border: 1px solid var(--accent); }
            .status-msg { font-size: 0.8rem; color: #00ff00; }
        </style>
    </head>
    <body>
        <header>
            <span id="status">CAT4_NEWS_SUBSYSTEM [READY]</span>
            <a href="/" style="color:var(--fg); text-decoration:none;">[ EXIT ]</a>
        </header>

        <div id="news-grid" class="news-row">SYNCING_ASSETS...</div>

        <div id="reader">
            <div class="reader-content">
                <div class="reader-header">
                    <span>DATA_VIEWER</span>
                    <span class="close-btn" onclick="closeReader()">[ CLOSE_ESC ]</span>
                </div>
                <div id="reader-body"></div>
            </div>
        </div>

        <script>
            async function loadNews(retries = 3) {
                const grid = document.getElementById('news-grid');
                const status = document.getElementById('status');
                
                try {
                    const res = await fetch('https://api.jikan.moe/v4/anime/recent/recommendations');
                    
                    if (res.status === 429 && retries > 0) {
                        status.innerText = `RATE_LIMITED: RETRYING_IN_${4 - retries}s...`;
                        await new Promise(r => setTimeout(r, 2000));
                        return loadNews(retries - 1);
                    }

                    if (!res.ok) throw new Error();

                    const json = await res.json();
                    grid.innerHTML = "";
                    status.innerText = "CAT4_NEWS_SUBSYSTEM [ONLINE]";

                    json.data.slice(0, 15).forEach(item => {
                        const entry = item.entry[0];
                        const img = entry.images.jpg.large_image_url;
                        const strip = document.createElement('div');
                        strip.className = 'article-strip';
                        strip.onclick = () => openReader(item.content, img, entry.title);
                        strip.innerHTML = `<img src="${img}"><div>> ${entry.title}</div>`;
                        grid.appendChild(strip);
                    });
                } catch (e) {
                    grid.innerHTML = `<div style="color:red;">CONNECTION_ERROR: API_REJECTED_REQUEST<br><br><button onclick="loadNews()" style="background:none; border:1px solid white; color:white; cursor:pointer; font-family:inherit; padding:5px 10px;">FORCE_RECONNECT</button></div>`;
                    status.innerText = "CAT4_NEWS_SUBSYSTEM [OFFLINE]";
                }
            }

            function openReader(content, image, title) {
                const body = document.getElementById('reader-body');
                body.innerHTML = `
                    <h2>${title}</h2>
                    <img src="${image}" style="width:100%;">
                    <div class="article-body"><p>${content}</p></div>
                `;
                document.getElementById('reader').style.display = 'block';
                document.body.style.overflow = 'hidden';
            }

            function closeReader() { 
                document.getElementById('reader').style.display = 'none'; 
                document.body.style.overflow = 'auto';
            }

            window.addEventListener('keydown', (e) => { if (e.key === "Escape") closeReader(); });
            loadNews();
        </script>
    </body>
</html>
