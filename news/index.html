<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>cat4 // news_core</title>
        <style>
            :root { --bg: #000000; --fg: #ffffff; --accent: #444444; --font: "JetBrains Mono", monospace; }
            body { background: var(--bg); color: var(--fg); font-family: var(--font); margin: 0; padding: 20px; }
            header { border-bottom: 1px solid var(--fg); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.8rem; }
            .news-row { display: flex; flex-direction: column; gap: 10px; max-width: 900px; margin: 0 auto; }
            .article-strip { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid var(--accent); cursor: pointer; }
            .article-strip:hover { border-color: var(--fg); background: #111; }
            #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; overflow-y: auto; padding: 40px 20px; }
            .reader-content { max-width: 800px; margin: 0 auto; border: 1px solid var(--fg); padding: 30px; background: var(--bg); }
            .article-body { line-height: 1.8; color: #ccc; }
            .article-body img { max-width: 100%; height: auto; margin: 10px 0; }
        </style>
    </head>
    <body>
        <header>
            <span>CAT4_NEWS_READER [ACTIVE]</span>
            <a href="/" style="color:var(--fg); text-decoration:none;">[ EXIT_TO_ROOT ]</a>
        </header>

        <div id="news-grid" class="news-row">LOADING_LOCAL_DATA...</div>

        <div id="reader">
            <div class="reader-content">
                <div style="text-align:right; margin-bottom:10px;"><span style="cursor:pointer; color:red;" onclick="closeReader()">[ CLOSE_ESC ]</span></div>
                <div id="reader-body"></div>
            </div>
        </div>

        <script>
            async function loadNews() {
                const grid = document.getElementById('news-grid');
                try {
                    const res = await fetch('./news.json');
                    const data = await res.json();
                    grid.innerHTML = "";
                    data.forEach(item => {
                        const strip = document.createElement('div');
                        strip.className = 'article-strip';
                        strip.onclick = () => {
                            document.getElementById('reader-body').innerHTML = `<h2>${item.title}</h2><div class="article-body">${item.content}</div>`;
                            document.getElementById('reader').style.display = 'block';
                        };
                        strip.innerHTML = `<div>> ${item.title}</div>`;
                        grid.appendChild(strip);
                    });
                } catch (e) {
                    grid.innerHTML = "CORE_SYNC_ERROR: RUN_ACTIONS_MANUALLY";
                }
            }
            function closeReader() { document.getElementById('reader').style.display = 'none'; }
            window.onkeydown = (e) => { if(e.key === "Escape") closeReader(); };
            loadNews();
        </script>
    </body>
</html>
