<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>₍^. .^₎⟆</title>
        <link rel="icon" type="image/png" href="cat.png" />
        <style>
            :root {
                --bg: #ffffff;
                --fg: #000000;
                --accent: #555555;
                --font: "JetBrains Mono", "Fira Code", monospace;
            }

            [data-theme="dark"] {
                --bg: #000000;
                --fg: #ffffff;
                --accent: #aaaaaa;
            }

            body {
                background-color: var(--bg);
                color: var(--fg);
                font-family: var(--font);
                margin: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                transition: background-color 0.1s, color 0.1s;
                overflow: hidden;
            }

            .container {
                width: 90%;
                max-width: 600px;
            }

            #clock {
                font-size: 4rem;
                font-weight: bold;
                margin-bottom: 10px;
            }

            .prompt::before {
                content: "> ";
                color: var(--accent);
            }

            .info-block {
                border-left: 2px solid var(--fg);
                padding-left: 20px;
                margin-top: 20px;
                margin-bottom: 25px;
            }

            #fact,
            #weather {
                font-size: 0.9rem;
                line-height: 1.4;
            }

            #theme-toggle {
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: none;
                border: 1px solid var(--fg);
                color: var(--fg);
                padding: 5px 12px;
                cursor: pointer;
                font-family: var(--font);
                font-size: 0.75rem;
            }

            #theme-toggle:hover {
                background: var(--fg);
                color: var(--bg);
            }

            ::selection {
                background: var(--fg);
                color: var(--bg);
            }
        </style>
    </head>
    <body>
        <button id="theme-toggle">[ LIGHT ]</button>

        <div class="container">
            <div id="clock">00:00:00</div>

            <div class="prompt">system_status</div>
            <div class="info-block">
                <div>USER: root</div>
                <div id="weather">WEATHER: Waiting for permission...</div>
                <div>ENV: start_page</div>
            </div>

            <div class="prompt">random_fact</div>
            <div class="info-block" id="fact">Fetching data...</div>
        </div>

        <script>
            const clockElement = document.getElementById("clock");
            const factElement = document.getElementById("fact");
            const weatherElement = document.getElementById("weather");
            const btn = document.getElementById("theme-toggle");
            const html = document.documentElement;

            function updateClock() {
                const now = new Date();
                clockElement.innerText = now.toLocaleTimeString("en-GB", {
                    hour12: false,
                });
            }
            setInterval(updateClock, 1000);
            updateClock();

            async function getFact() {
                try {
                    const response = await fetch("https://uselessfacts.jsph.pl/api/v2/facts/random");
                    const data = await response.json();
                    factElement.innerText = data.text;
                } catch (err) {
                    factElement.innerText = "Failed to load fact.";
                }
            }

            function getWeather() {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        try {
                            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                            const data = await res.json();
                            const temp = Math.round(data.current_weather.temperature);
                            const code = data.current_weather.weathercode;
                            const conditions = {
                                0: "Clear", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
                                45: "Foggy", 51: "Drizzle", 61: "Rainy", 71: "Snowy", 95: "Stormy",
                            };
                            const desc = conditions[code] || "Conditions Normal";
                            weatherElement.innerText = `WEATHER: ${temp}°C / ${desc}`;
                        } catch (err) {
                            weatherElement.innerText = "WEATHER: API Error";
                        }
                    }, (error) => {
                        weatherElement.innerText = "WEATHER: Permission Denied";
                    });
                } else {
                    weatherElement.innerText = "WEATHER: Not Supported";
                }
            }

            getFact();
            getWeather();

            const updateBtn = (theme) => {
                btn.innerText = theme === "dark" ? "[ DARK ]" : "[ LIGHT ]";
            };

            const savedTheme = localStorage.getItem("theme") || "light";
            html.setAttribute("data-theme", savedTheme);
            updateBtn(savedTheme);

            btn.addEventListener("click", () => {
                const newTheme = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
                html.setAttribute("data-theme", newTheme);
                localStorage.setItem("theme", newTheme);
                updateBtn(newTheme);
            });

            document.addEventListener("keydown", (e) => {
                if (e.key.toLowerCase() === "t") btn.click();
            });
        </script>
    </body>
</html>
