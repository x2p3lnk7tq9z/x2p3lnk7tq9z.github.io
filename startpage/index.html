<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>₍^. .^₎⟆</title>
        <link rel="icon" type="image/png" href="../pictures/cat.png" />
        <style>
            :root {
                --bg: #000000;
                --fg: #ffffff;
                --accent: #555555;
                --font: "JetBrains Mono", "Fira Code", monospace;
                --term-border: #ffffff;
            }

            body.light-mode {
                --bg: #ffffff;
                --fg: #000000;
                --accent: #aaaaaa;
                --term-border: #000000;
            }

            body {
                background-color: var(--bg);
                color: var(--fg);
                font-family: var(--font);
                margin: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                transition:
                    background-color 0.1s,
                    color 0.1s;
                overflow: hidden;
            }

            .container {
                width: 90%;
                max-width: 600px;
            }

            #clock {
                font-size: 4rem;
                font-weight: bold;
                margin-bottom: 10px;
            }

            .prompt::before {
                content: "> ";
                color: var(--accent);
            }

            .info-block {
                border-left: 2px solid var(--fg);
                padding-left: 20px;
                margin-top: 20px;
                margin-bottom: 25px;
            }

            #fact,
            #weather {
                font-size: 0.9rem;
                line-height: 1.4;
            }

            ::selection {
                background: var(--fg);
                color: var(--bg);
            }

            #term-overlay {
                display: none;
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 95%;
                max-width: 600px;
                background: var(--bg);
                color: var(--fg);
                padding: 15px;
                border: 1px solid var(--term-border);
                z-index: 1000;
                box-sizing: border-box;
            }

            #term-help {
                font-size: 0.75rem;
                color: var(--accent);
                border-bottom: 1px dashed var(--accent);
                margin-bottom: 10px;
                padding-bottom: 5px;
            }

            .input-wrapper {
                display: flex;
                align-items: center;
                height: 1.2rem;
            }

            #term-input {
                background: none;
                border: none;
                color: inherit;
                font-family: inherit;
                font-size: 0.85rem;
                outline: none;
                flex: 1;
                margin-left: 10px;
                padding: 0;
                line-height: 1.2rem;
            }

            .shell-prompt {
                color: var(--accent);
                white-space: nowrap;
                font-size: 0.85rem;
                line-height: 1.2rem;
            }

            #term-output {
                font-size: 0.8rem;
                margin-bottom: 8px;
                white-space: pre-wrap;
                color: var(--fg);
                line-height: 1.4;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div id="clock">00:00:00</div>

            <div class="prompt">system_status</div>
            <div class="info-block">
                <div>USER: root</div>
                <div id="weather">WEATHER: Waiting for permission...</div>
                <div>ENV: start_page</div>
            </div>

            <div class="prompt">random_fact</div>
            <div class="info-block" id="fact">Fetching data...</div>
        </div>

        <div id="term-overlay">
            <div id="term-help">commands: theme, clear, exit</div>
            <div id="term-output"></div>
            <div class="input-wrapper">
                <span class="shell-prompt">cat4@sh:~$</span>
                <input
                    type="text"
                    id="term-input"
                    spellcheck="false"
                    autocomplete="off"
                />
            </div>
        </div>

        <script>
            const overlay = document.getElementById("term-overlay");
            const input = document.getElementById("term-input");
            const output = document.getElementById("term-output");
            const clockElement = document.getElementById("clock");
            const factElement = document.getElementById("fact");
            const weatherElement = document.getElementById("weather");

            const applyTheme = (isDark) => {
                if (isDark) {
                    document.body.classList.remove("light-mode");
                } else {
                    document.body.classList.add("light-mode");
                }
            };

            const savedDark = localStorage.getItem("theme") !== "light";
            applyTheme(savedDark);

            function updateClock() {
                const now = new Date();
                clockElement.innerText = now.toLocaleTimeString("en-GB", {
                    hour12: false,
                });
            }
            setInterval(updateClock, 1000);
            updateClock();

            async function getFact() {
                try {
                    const response = await fetch(
                        "https://uselessfacts.jsph.pl/api/v2/facts/random",
                    );
                    const data = await response.json();
                    factElement.innerText = data.text;
                } catch (err) {
                    factElement.innerText = "Failed to load fact.";
                }
            }

            function getWeather() {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const lat = position.coords.latitude;
                            const lon = position.coords.longitude;
                            try {
                                const res = await fetch(
                                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`,
                                );
                                const data = await res.json();
                                const temp = Math.round(
                                    data.current_weather.temperature,
                                );
                                const code = data.current_weather.weathercode;
                                const conditions = {
                                    0: "Clear",
                                    1: "Mainly Clear",
                                    2: "Partly Cloudy",
                                    3: "Overcast",
                                    45: "Foggy",
                                    51: "Drizzle",
                                    61: "Rainy",
                                    71: "Snowy",
                                    95: "Stormy",
                                };
                                const desc =
                                    conditions[code] || "Conditions Normal";
                                weatherElement.innerText = `WEATHER: ${temp}°C / ${desc}`;
                            } catch (err) {
                                weatherElement.innerText = "WEATHER: API Error";
                            }
                        },
                        () => {
                            weatherElement.innerText =
                                "WEATHER: Permission Denied";
                        },
                    );
                } else {
                    weatherElement.innerText = "WEATHER: Not Supported";
                }
            }

            getFact();
            getWeather();

            const toggleTheme = () => {
                const isLight = document.body.classList.contains("light-mode");
                localStorage.setItem("theme", isLight ? "dark" : "light");
                applyTheme(isLight);
            };

            document.addEventListener("keydown", (e) => {
                if (e.ctrlKey && e.key === "e") {
                    e.preventDefault();
                    overlay.style.display =
                        overlay.style.display === "block" ? "none" : "block";
                    if (overlay.style.display === "block") input.focus();
                }
                if (e.key === "Escape") overlay.style.display = "none";
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    const cmd = input.value.toLowerCase().trim();
                    input.value = "";

                    if (cmd === "theme") {
                        toggleTheme();
                        output.innerText = "theme toggled.";
                    } else if (cmd === "clear") {
                        output.innerText = "";
                    } else if (cmd === "exit") {
                        overlay.style.display = "none";
                    } else if (cmd !== "") {
                        output.innerText = "sh: command not found: " + cmd;
                    }
                }
            });
        </script>
    </body>
</html>
