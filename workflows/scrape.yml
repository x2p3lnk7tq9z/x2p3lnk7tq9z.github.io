name: cat4-core-sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install feedparser requests beautifulsoup4 lxml
      - run: python news/core.py
      - run: |
          git config --global user.name "cat4-core-bot"
          git config --global user.email "bot@cat4.org"
          git add news/news.json
          git commit -m "sync: news update" || exit 0
          git push
